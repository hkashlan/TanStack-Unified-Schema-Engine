services:
  db:
    image: postgres:16-alpine
    container_name: postgres_tanstack
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5532:5432"

volumes:
  postgres_data:
